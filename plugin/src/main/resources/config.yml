# 以下部分选项需要重启服务器或重载插件后生效。
main:
  prefix: "&8[&e&l⚡&8] "
  # 悬停时显示 LagFixer 版本信息。
  prefix_hover: true
  # 多线程同步尚未经过充分测试。
  threads: 1
  # TPS、MSPT、CPU 及其他指标的更新间隔（秒）。
  monitor_interval: 5
  # 自动向支持团队报告 LagFixer 错误和 Spark 性能分析数据。
  errors_reporter: true

  updater: true
  # 对不支持的传统方法显示警告。
  warnings: true
  # 优化指标可在 https://bstats.org/plugin/bukkit/LagFixer/19292 查看。
  bStats: true

  command:
    permission: "lagfixer.command"
    aliases:
      - lf
      - antilag
      - lag

  map:
    enabled: true
    interval: 3 # 地图处理器（/lagfixer map）的更新间隔（秒）。建议至少为 monitor_interval 的两倍。
