WorldCleaner:
  enabled: true
  worlds: # 使用 '*' 启用所有世界。
    - world
    - world_the_end
    - world_nether
  values:
    interval: 600 # WorldCleaner 运行的间隔（秒）。
    alerts:
      enabled: true
      permission: "" # 留空以禁用权限。
      actionbar: false # 快捷栏上方的临时消息
      message: true

    # 命令：/lagfixer clear items
    items:
      enabled: true
      disable_item_despawn: false # 若为 true，LagFixer 将代替 Bukkit 处理物品消失。
      time_lived: 10000 # 物品被移除前必须存在的最短时间（毫秒）（-1 禁用）。
      blacklist: # 材质：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
        - BEACON
      abyss: # 深渊存储被删除的物品，玩家可通过 /abyss 取回。
        enabled: false
        alerts: true # 在 lang.yml 中配置。
        permission: "" # 留空以禁用权限。
        item_despawn: true # 若为 true，物品消失时添加到深渊。
        close: 60 # 此时间后清空深渊物品栏并禁用命令。
        blacklist: # 材质：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
          - BEDROCK
          - BEACON

    # 命令：/lagfixer clear creatures
    creatures:
      enabled: true
      named: false        # 若为"true"移除有名称的生物
      drop_items: false   # 若为"true"移除生物时掉落物品
      stacked: true       # 若为"true"移除堆叠实体（WildStacker、RoseStacker 和 UltimateStacker 钩子）
      levelled: true      # 若为"true"移除等级生物（LevelledMobs 钩子）
      ignore_models: true # 若为"true"保留 ModelEngine 或 MythicMobs 的实体
      list_mode: true     # 若为"true"仅移除列表中的实体；若为 false，移除所有未列出的实体
      list: # 允许的生物：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
        - BAT
        - ZOMBIE
        - SKELETON
        - SLIME
        - CREEPER
        - SPIDER
        - PHANTOM
        - SILVERFISH
        - SQUID
        - GLOW_SQUID
        - COD
        - SALMON
        - PUFFERFISH
        - TROPICAL_FISH

    # 命令：/lagfixer clear projectiles（如箭、雪球）
    projectiles:
      enabled: true
      list_mode: true # 若为"true"仅移除列表中的实体；若为 false，移除所有未列出的实体
      list: # 抛射物：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
        - EGG
        - SNOWBALL
        - ARROW
        - EXPERIENCE_BOTTLE
