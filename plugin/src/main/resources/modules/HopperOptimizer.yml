HopperOptimizer:
  enabled: true
  worlds:
    - '*'
  values:
    smart_throttling: true

    # 启用基于区块的漏斗限制
    chunk_limit:
      enabled: false
      # 每个区块允许的最大漏斗数量
      limit: 16

    # 优化没有物品可传输的漏斗
    empty_hopper_optimization:
      enabled: true
      # 再次检查空漏斗前的等待时间（毫秒）
      empty_check_delay: 100

    # 优化因目标已满而无法传输的漏斗
    full_hopper_optimization:
      enabled: true
      # 再次检查满漏斗前的等待时间（毫秒）
      full_check_delay: 80

    # 漏斗优化检查的运行频率（毫秒）
    hopper_check_interval: 2000

    # 漏斗被视为"非活动"之前的时间（毫秒）
    # 非活动漏斗的检查频率更低
    inactive_hopper_delay: 30000
