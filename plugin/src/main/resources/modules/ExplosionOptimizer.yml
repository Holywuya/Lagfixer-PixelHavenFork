ExplosionOptimizer:
  enabled: true
  worlds:
    - '*'
  values:
    # 限制最大爆炸威力/半径以减少过度破坏
    yield_limit:
      enabled: false

      # 所有爆炸源的最大爆炸威力
      # 越高 = 破坏越大，越低 = 伤害越小
      # Minecraft 中 TNT 的默认威力为 4.0
      default: 4.0

      # 按实体类型设置爆炸威力限制：
      # 这些值会覆盖"default"设置
      # 实体类型：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
      per_entity:
        - "TNT:4.0"          # TNT（最常见）
        - "TNT_MINECART:4.0" # TNT 矿车
        - "CREEPER:3.0"      # 苦力怕（稍弱）
        - "FIREBALL:1.0"     # 恶魂火球
        - "WITHER_SKULL:1.0" # 凋灵骷髅抛射物
        - "END_CRYSTAL:6.0"  # 末地水晶（本身较强）

    # 防止连锁反应，即一次爆炸触发附近的其他爆炸
    anti_chain:
      enabled: true

      # 防止连锁反应：
      prevent_tnt_chains: true      # TNT 不会触发其他 TNT
      prevent_creeper_chains: false # 苦力怕仍可触发其他爆炸
      prevent_crystal_chains: true  # 末地水晶不会连锁

      # 防止爆炸点燃 TNT 方块
      # true = 爆炸不会点燃TNT，false = 正常行为
      prevent_block_ignition: true

      # 检测潜在连锁反应的半径（方块）
      chain_radius: 8.0

      # 一次连锁中允许的最大爆炸数
      max_chain_size: 3

      # 爆炸后允许新连锁的冷却时间（毫秒）
      chain_cooldown: 1000

    management:
      # ⚠️ 警告：这将完全禁用爆炸！
      # 仅在你因爆炸导致严重卡顿时启用
      enabled: false

      # 要禁用的爆炸类型：
      cancel_block_explosions: true # 下界中的床等
      cancel_creepers: false        # 保留苦力怕的游戏性
      cancel_crystals: true
      cancel_fireballs: true
      cancel_tnt: true
      cancel_wither_skulls: true

      # 禁用爆炸时的部分效果：
      explosion_damage: # 对实体造成伤害但不破坏方块
        enabled: false
        multiplier: 2.5
      explosion_sound: # 保留声音以维持沉浸感
        enabled: true
        volume: 1.0
      explosion_knockback: # 有击退但不破坏方块
        enabled: false
        multiplier: 0.6
        use_newton_raphson: true # 比 Math.sqrt 更快
