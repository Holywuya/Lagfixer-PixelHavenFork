LagShield:
  enabled: true
  worlds: # 使用 '*' 启用所有世界。
    - world
    - world_the_end
    - world_nether
  values:
    # TPS 阈值，低于该值时特定功能将被禁用。
    # 设为 -1 以完全禁用某项功能的检查。
    tps_threshold:
      entity_spawn: 19         # 低于此 TPS 时禁用实体生成。
      tick_hopper: 18          # 低于此 TPS 时禁用漏斗传输。
      redstone: 18             # 低于此 TPS 时禁用红石更新。
      projectiles: 15          # 低于此 TPS 时取消抛射物（箭、雪球等）。
      leaves_decay: 19         # 低于此 TPS 时停止树叶腐烂。
      mobai: -1                # 低于此 TPS 时禁用生物 AI。
      liquid_flow: 18          # 低于此 TPS 时停止液体流动（水/岩浆）。
      explosions: 18.5         # 低于此 TPS 时取消爆炸。
      fireworks: 19            # 低于此 TPS 时取消烟花。

    # 动态玩家视距调整。
    # 键 = TPS，值 = 该 TPS 下设置的视距。
    # 值受 spigot.yml 中"view-distance"的限制
    # 此选项可能在更改视距时导致玩家屏幕闪烁（区块重新加载）。
    # 范围：2–32 个区块。
    dynamic_view_distance:
      enabled: false
      tps_thresholds:
        - "20.1:10" # TPS 20 时 -> 视距 10
        - "18.0:8"  # TPS 18 时 -> 视距 8
        - "15.0:6"  # TPS 15 时 -> 视距 6
        - "10.0:2"  # TPS 10 时 -> 视距 2

    # 动态模拟距离调整。
    # 控制距离玩家多远范围内激活机制（生物 AI、刻等）。
    # 值受 spigot.yml 中"simulation-distance"的限制
    # 同时受视距限制，避免模拟不可见的区块
    dynamic_simulation_distance:
      enabled: true
      tps_thresholds:
        - "20.1:5"  # TPS 20 时 -> 模拟距离 5
        - "18.0:4"  # TPS 18 时 -> 模拟距离 4
        - "15.0:3"  # TPS 15 时 -> 模拟距离 3
        - "10.0:1"  # TPS 10 时 -> 模拟距离 1

    # 动态随机刻速度调整。
    # 根据当前 TPS 动态调整"randomTickSpeed"游戏规则。
    # 影响随机方块更新，如作物生长、树叶腐烂、火焰蔓延和其他随机刻行为。
    # 值越高世界活动越多，值越低则减少活动以提升性能。
    # Minecraft 默认值通常为 3。
    dynamic_tick_speed:
      enabled: true
      tps_thresholds:
        - "20.1:3"  # TPS 20 时 -> 随机刻速度 3（默认）
        - "18.0:2"  # TPS 18 时 -> 随机刻速度 2
        - "15.0:1"  # TPS 15 时 -> 随机刻速度 1
        - "10.0:0"  # TPS 10 时 -> 随机刻速度 0（禁用）
