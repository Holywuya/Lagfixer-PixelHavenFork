ConsoleFilter:
  enabled: false
  worlds: [ ]
  values:
    logs_limit: 10 # "/logs" 目录中保存的最大日志数量。使用 -1 禁用。
    filter:
      enabled: false
      save_filtered: true
      error_filtering: false
      patterns:
        - '^<(([A-Za-z0-9_]{3,16}))> (.{0,})' # 过滤聊天消息。
        - '^/([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\:([0-9]{1,5}) lost connection' # 过滤"失去连接"消息。
        - 'Reached end of stream for /([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})$' # 过滤"到达流末尾"消息。
        - '([A-Za-z0-9_]{3,16}) issued server command: /(.{0,})' # 过滤"玩家执行服务器命令"消息（可用于隐藏密码等敏感数据）。
        - 'Read timed out' # 过滤"读取超时"消息。
        - '^.*logged in with entity id ([0-9]{0,}) at.*$' # 过滤登录消息。
        - '([A-Za-z0-9_]{3,16}) lost connection: Disconnected' # 过滤玩家断开连接消息。
        - '^(§e)([A-Za-z0-9_]{3,16}) left the game.' # 过滤类似"§ePLAYER 离开了游戏。"的消息。
        - 'Connection reset' # 过滤"连接重置"消息。
        - 'CONSOLE: Forcing save\.\..*' # 过滤控制台强制保存消息。
        - 'CONSOLE: Save complete\.\..*' # 过滤控制台保存完成消息。
