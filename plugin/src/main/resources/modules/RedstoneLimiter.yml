RedstoneLimiter:
  enabled: true
  worlds: # 使用 '*' 启用所有世界。
    - '*'
  values:
    alerts: true

    # 每区块每秒的最大刻数。
    ticks_limit:
      redstone: 1100
      # 总推动方块数。
      piston: 50

    # LagFixer 检测到时是否破坏方块？
    break_block:
      redstone: false
      piston: false

    piston:
      # 材质：https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
      push_blacklist:
        - SAND
        - RED_SAND
        - GRAVEL

    # 拉杆、按钮、红石火把等的冷却时间（毫秒）。
    click_cooldown: 1500
