EntityLimiter:
  enabled: true
  worlds: # 使用 '*' 启用所有世界。
    - '*'
  values:
    whitelist: # 不会被移除的实体列表：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
      - VILLAGER
      - ZOMBIE_VILLAGER
      - ENDER_DRAGON
      - WITHER
      - WOLF
      - CAT

    ignore_models: true # 若为"true"，限制将不适用于 ModelEngine 或 MythicMobs 的实体
    creatures: 15 # 每区块的动物和怪物数量（-1 禁用）。
    items: -1 # 每区块的掉落物品数量（-1 禁用）。
    vehicles: 3 # 每区块的矿车和船数量（-1 禁用）。
    projectiles: 5 # 每区块的抛射物数量（-1 禁用）。
    reasons: # 生成原因：https://hub.spigotmc.org/javadocs/spigot/org/bukkit/event/entity/CreatureSpawnEvent.SpawnReason.html
      - DEFAULT
      - EGG
      - NATURAL
      - SPAWNER
      - SPAWNER_EGG
      - COMMAND

    overflow_purge: # 溢出清理限制每个区块的实体数量，移除多余的实体以防止玩家尝试过载区块导致服务器卡顿。
      enabled: false
      interval: 30 # 清理间隔（秒），定义每个周期内区块中多余实体的移除频率
      limit_multiplier: 1.5 # 限制乘数，避免移除过多生物
      types:
        creatures: true
        items: false
        vehicles: true
        projectiles: true
        named: false # 若为"false"，溢出清理不会移除有自定义名称的实体
