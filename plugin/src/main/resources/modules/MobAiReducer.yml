# 需要重启服务器才能应用更改。
MobAiReducer:
  enabled: true
  worlds: # 使用 '*' 启用所有世界。
    - '*'
  values:
    collides: true # 禁用此选项可存储多达2倍的生物，但可能阻止箭矢命中优化的实体。
    silent: false # 禁用音频数据包，提升大型农场的性能。
    async: true
    force_load: true # 在插件重载时覆盖实体 AI。
    click_event: true # 玩家点击生物时发送信息（已被开发者禁用）。
    purge_interval: 30 # 优化 MobAI 的生物缓存清理频率（秒）。不会从世界中移除生物——仅从内部 WeakHashMap 中移除以防止内存泄漏。
    ignore_models: true # 若为"true"，MobAiReducer 不会应用于 ModelEngine 或 MythicMobs 的实体

    # 触发的生成原因列表。生成原因：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/event/entity/CreatureSpawnEvent.SpawnReason.html
    spawn_reasons:
      - NATURAL
      - SPAWNER_EGG
      - SPAWNER
      - EGG
      - BREEDING
      - DISPENSE_EGG
      - ENDER_PEARL
      - COMMAND

    # 将被替换 Mob AI 和寻路系统的实体。
    entities:
      animals: true
      monsters: true
      villagers: false
      tameable: false # 宠物（如狼、马、猫、羊驼、鹦鹉）。
      birds: false # 飞行实体（如蜜蜂、鹦鹉）。
      others: true

    # 若为"true"仅优化列表中的实体；若为"false"优化所有未列出的实体
    list_mode: false

    # 实体类型：https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
    list:
      - WOLF
      - MOOSHROOM
      - SNOW_GOLEM
      - IRON_GOLEM
      - ENDER_DRAGON
      - WARDEN

    pathfinder:
      # 若为"true"寻路器将保留实体的专属寻路器（如苦力怕爆炸）
      keep_dedicated: true

      # 若为"true"仅移除列表中的寻路器；若为"false"移除所有未列出的寻路器
      list_mode: false

      # 类名中包含指定短语的寻路器列表
      list:
        - AttackableTarget
        - HurtByTarget
        - Attack
        - BowShoot
        - Swell
        - Eat
        - FishSchool
        - Sit
        - FollowOwner
        - Panic
      # - AvoidTarget
      # - RestrictSun
      # - FleeSun

    animals:
      tempt:
        enabled: true
        # 玩家搜索范围。
        range: 6.25
        # 移动速度。
        speed: 1.25
        # 玩家搜索冷却时间（刻）。
        cooldown: 30
        # 村民跟随持有绿宝石的玩家。
        villagers: true
        # 若为 false，仅检查主手。
        trigger_both_hands: true
        # 以 Tempt 原因调用 EntityTargetEvent。
        event: false
        # 不推荐，但可以优化数据包流
        teleport: false
      breed:
        enabled: true
        # 伴侣搜索范围。
        range: 5.0
        # 移动速度。
        speed: 1.0
        # 以 Custom 原因调用 EntityTargetEvent。
        event: false
        # 不推荐，但可以优化数据包流
        teleport: false
