#即将支持翻译所有消息
messages:
  Main:
    no_access: "<gray>缺少此模块的权限：<yellow><permission>"
    disabled_module: "<gray>模块 <yellow><module> <gray>已禁用，管理员需启用此功能！"
    player_only: "<gray>此命令只能由玩家执行！"

  RedstoneLimiter:
    alert: "<gray>已在区块中阻止 <yellow><ticks> <gray>个红石刻，位置：<gradient:#c48d00:#fffb00><location></gradient><gray>！"
    cooldown: "<gray>你可以在 <gradient:#c48d00:#fffb00><cooldown></gradient><gray>ms 后再次使用 <material>。"

  WorldCleaner:
    countingdown: # 消息格式 -> "秒数=消息"
      - "15=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "10=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "5=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "4=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "3=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "2=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "1=<gradient:#ff3c00:#ffff00>警告！</gradient> <gray>服务器将在 <color:#ff8800><remaining> <gray>秒后清理实体和物品！"
      - "0=<gray>已成功移除 <color:#ff8800><items>x <gray>个物品、<color:#ff8800><creatures>x <gray>个生物和 <color:#ff8800><projectiles>x <gray>个抛射物！"
    items:
      abyss: #深渊是所有被删除物品存放的地方，玩家可以通过输入 /abyss 命令取回物品
        close: "<gray>深渊已成功关闭！"
        open: "<gray>深渊已成功开启，取回你的物品：<yellow>/abyss"
        empty: "<gray>深渊为 <blue>空<gray>，请等待再次开启！"
        closed: "<gray>深渊已 <red>关闭<gray>，请等待再次开启！"
        opened: "<gray>深渊物品栏已成功 <green>打开<gray>！"
        gui:
          name: "<white>深渊！ <dark_gray>(<gray>第 <page> 页<dark_gray>)"
          previous: "<dark_gray>← <red><b>上一页！</b>"
          next: "<dark_gray>→ <green><b>下一页！</b>"
