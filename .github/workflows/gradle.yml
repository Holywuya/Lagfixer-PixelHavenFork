# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. 构建与测试任务
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # PR 触发时通常不需要写权限

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # 使用最新版 v6 (截至2026年5月)
    # See: https://github.com/gradle/actions/tree/main/setup-gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/libs/*.jar # 直接指向 jar 路径，避免空文件夹报错
        retention-days: 7

  # 2. 依赖关系提交任务 (仅在 push 时运行)
  dependency-submission:
    if: github.event_name == 'push' # 仅主分支推送时分析依赖，PR 无需分析
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入依赖图

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # 使用最新版 v6
    # See: https://github.com/gradle/actions/tree/main/dependency-submission
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v6

  # 3. 自动发布 Release
  release:
    runs-on: ubuntu-latest
    needs: build
    # 仅在非 PR 且是 main 分支时触发
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 必须获取所有历史以进行 tag 排序

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: release/

    - name: Auto Increment Version
      id: get_version
      run: |
        git fetch --tags
        # 优化正则匹配，去除 v 前缀
        LATEST_TAG=$(git tag -l "v1.0.*" | sort -V | tail -n 1)
        
        if [ -z "$LATEST_TAG" ]; then
          NEW_VERSION="1.0.0"
          echo "No existing 1.0.x tags found, starting from 1.0.0"
        else
          # 提取版本号逻辑修正
          CURRENT_X=$(echo "$LATEST_TAG" | sed -E 's/v1\.0\.([0-9]+)/\1/')
          NEXT_X=$((CURRENT_X + 1))
          NEW_VERSION="1.0.${NEXT_X}"
          echo "Latest tag: $LATEST_TAG, next version: $NEW_VERSION"
        fi
        
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.get_version.outputs.tag }}
        git push origin ${{ steps.get_version.outputs.tag }}

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.get_version.outputs.tag }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          This release is automatically compiled by GitHub Actions.
          ### Version
          `${{ steps.get_version.outputs.version }}`
          ### Commit Message
          ${{ github.event.head_commit.message }}
        artifacts: release/*.jar
        generateReleaseNotes: true
        prerelease: false
        makeLatest: true
        # 推荐使用 secrets.GITHUB_TOKEN 而非硬编码 token
        token: ${{ secrets.GITHUB_TOKEN }}
